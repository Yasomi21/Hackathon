<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ENU Drone Swarm Simulation</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main id="app" aria-label="3D ENU drone swarm simulation"></main>

    <section id="hud" class="hud" aria-live="polite">
      <header class="hud-header">
        <div>
          <p id="selectedDroneCode" class="eyebrow">COMMAND / DRONE A</p>
          <h1 id="selectedDroneName">Drone A</h1>
        </div>
        <div class="header-actions">
          <span id="statusBadge" class="status-badge">Flying</span>
          <button id="resetScenarioButton" class="reset-button" type="button">Reset</button>
        </div>
      </header>

      <div class="drone-selector" role="group" aria-label="Select drone telemetry">
        <button class="drone-button active" type="button" data-drone-index="0">A</button>
        <button class="drone-button" type="button" data-drone-index="1">B</button>
        <button class="drone-button" type="button" data-drone-index="2">C</button>
        <button class="drone-button" type="button" data-drone-index="3">D</button>
        <button class="drone-button" type="button" data-drone-index="4">E</button>
      </div>

      <div class="display-mode" role="group" aria-label="Display shader mode">
        <button class="mode-button active" type="button" data-display-mode="tactical">
          TAC
        </button>
        <button class="mode-button" type="button" data-display-mode="nightVision">
          NVG
        </button>
        <button class="mode-button" type="button" data-display-mode="infrared">
          IR
        </button>
      </div>

      <div class="hud-grid">
        <div class="metric">
          <span>Position</span>
          <strong id="positionValue">x 0.0 | y 0.0 | z 0.0</strong>
        </div>
        <div class="metric">
          <span>Velocity</span>
          <strong id="velocityValue">x 0.0 | y 0.0 | z 0.0</strong>
        </div>
        <div class="metric">
          <span>Target</span>
          <strong id="targetValue">x 0.0 | y 0.0 | z 0.0</strong>
        </div>
        <div class="metric">
          <span>GPS</span>
          <strong id="gpsValue">x 0.0 | y 0.0 | z 0.0</strong>
        </div>
        <div class="metric tall">
          <span>IMU</span>
          <strong id="imuValue">accelerometer x 0.0 | y 0.0 | z 0.0</strong>
        </div>
        <div class="metric">
          <span>Distance</span>
          <strong id="distanceValue">0.0 m</strong>
        </div>
        <div class="metric">
          <span>Nearest</span>
          <strong id="nearestValue">none</strong>
        </div>
        <div class="metric">
          <span>Thermal</span>
          <strong id="thermalValue">people 0 | animals 0</strong>
        </div>
        <div class="metric">
          <span>Wind</span>
          <strong id="windValue">0.0 m/s @ 0 deg</strong>
        </div>
        <div class="metric">
          <span>Reached</span>
          <strong id="reachedValue">No</strong>
        </div>
      </div>
    </section>

    <script type="module" src="./main.js"></script>
  </body>
</html>
